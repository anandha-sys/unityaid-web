<!DOCTYPE html>
<html>
<head>
  <title>UnityAid</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#0a43b8,#39c53f);
      color:white;
      min-height:100vh;
    }

    nav{
      display:flex;
      justify-content:space-between;
      padding:20px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:15px;
    }

    .hero{
      height:85vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    h1{
      font-size:55px;
    }

    p{
      margin-top:20px;
      font-size:20px;
      max-width:700px;
    }

    .buttons{
      margin-top:30px;
    }

    button{
      padding:15px 30px;
      border:none;
      border-radius:30px;
      margin:10px;
      font-size:18px;
      cursor:pointer;
    }

    .donate{
      background:white;
      color:#0a43b8;
    }

    .volunteer{
      background:#0a43b8;
      color:white;
    }
  </style>
</head>

<body>

  <nav>
    <h2>UnityAid</h2>

    <div>
      <a href="#">Home</a>
      <a href="#">Campaigns</a>
      <a href="#">Donate</a>
      <a href="#">Volunteer</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Together We Can Change Lives</h1>

    <p>
      UnityAid connects caring people with communities
      that need support the most.
    </p>

    <div class="buttons">
      <button class="donate">
        Donate Now
      </button>

      <button class="volunteer">
        Become Volunteer
      </button>
    </div>
  </section>

</body>
</html>
